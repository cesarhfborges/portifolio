<section class="relative flex flex-col items-center justify-between py-4 lg:py-12">
  <img ngSrc="assets/hero.svg" alt="Hero" class="absolute -top-[98px] -z-10" width="1572" height="795"
       [priority]="true">

  <div class="grid grid-cols-1 items-start lg:grid-cols-2 lg:gap-12 gap-y-8">
    <div class="order-2 lg:order-1 flex flex-col items-start justify-center p-2 pb-20 md:pb-10 lg:pt-10" @rightToLeft>
      <h1
        class="text-3xl font-bold leading-10 text-white md:font-extrabold lg:text-[2.6rem] lg:leading-[3.5rem]"
        [innerHTML]="getInstantTranslation()"
      >...</h1>

      <div class="my-12 flex items-center gap-5">
        <a [href]="personalData.github" target="_blank"
           class="transition-all text-pink-500 hover:scale-125 duration-300">
          <fa-icon [icon]="faGithub" size="2x"></fa-icon>
        </a>
        <a [href]="personalData.linkedIn" target="_blank"
           class="transition-all text-pink-500 hover:scale-125 duration-300">
          <fa-icon [icon]="faLinkedin" size="2x"></fa-icon>
        </a>
        <a [href]="'mailto:' + personalData.email" target="_blank"
           class="transition-all text-pink-500 hover:scale-125 duration-300">
          <fa-icon [icon]="faEnvelope" size="2x"></fa-icon>
        </a>
        <a [href]="whatsappLink" target="_blank"
           class="transition-all text-pink-500 hover:scale-125 duration-300">
          <fa-icon [icon]="faWhatsapp" size="2x"></fa-icon>
        </a>
        <a [href]="telegramLink" target="_blank"
           class="transition-all text-pink-500 hover:scale-125 duration-300">
          <fa-icon [icon]="faTelegram" size="2x"></fa-icon>
        </a>
      </div>

      <div class="flex items-center gap-3">
        <a href="#contact"
           class="bg-gradient-to-r to-pink-500 from-violet-600 p-[1px] rounded-full transition-all duration-300 hover:from-pink-500 hover:to-violet-600">
          <button
            class="px-3 text-xs md:px-8 py-3 md:py-4 bg-[#0d1224] rounded-full border-none text-center md:text-sm font-medium uppercase tracking-wider text-[#ffff] no-underline transition-all duration-200 ease-out md:font-semibold flex items-center gap-1 hover:gap-3 cursor-pointer">
            <span>{{ 'app.heroSection.contact_me' | translate }}</span>
            <fa-icon [icon]="faDownload"></fa-icon>
          </button>
        </a>

        <a [href]="personalData.resume" target="_blank"
           class="flex items-center gap-1 hover:gap-3 rounded-full bg-gradient-to-r from-pink-500 to-violet-600 px-3 md:px-8 py-3 md:py-4 text-center text-xs md:text-sm font-medium uppercase tracking-wider text-white no-underline transition-all duration-200 ease-out hover:text-white hover:no-underline md:font-semibold cursor-pointer">
          <span>{{ 'app.heroSection.get_resume' | translate }}</span>
          <fa-icon [icon]="faDownload"></fa-icon>
        </a>
      </div>
    </div>

    <div
      class="order-1 lg:order-2 from-[#0d1224] border-[#1b2c68a0] relative rounded-lg border bg-gradient-to-r to-[#0a0d37]"
      @leftToRight
    >
      <div class="flex flex-row">
        <div class="h-[1px] w-full bg-gradient-to-r from-transparent via-pink-500 to-violet-600"></div>
        <div class="h-[1px] w-full bg-gradient-to-r from-violet-600 to-transparent"></div>
      </div>
      <div class="px-4 lg:px-8 py-5">
        <div class="flex flex-row space-x-2">
          <div class="h-3 w-3 rounded-full bg-red-400"></div>
          <div class="h-3 w-3 rounded-full bg-orange-400"></div>
          <div class="h-3 w-3 rounded-full bg-green-200"></div>
        </div>
      </div>
      <div class="overflow-hidden border-t-[2px] border-indigo-900 px-4 lg:px-8 ">
        <pre>
          <code
            [highlight]="codeString"
            language="typescript"
            lang="typescript"
            class="font-mono text-xs md:text-sm lg:text-base"
          ></code>
        </pre>
      </div>
    </div>
  </div>
</section>
